version: '3.8'
services:
  discord:
    build:
      context: .
      dockerfile: packages/discord/Dockerfile
    env_file: .env
    environment:
      - DB_PATH=/data/memory.db
      - SKILLS_DIR=/app/skills
    volumes:
      - agent-os-data:/data
      - ./skills:/app/skills:ro
    restart: unless-stopped

volumes:
  agent-os-data:
